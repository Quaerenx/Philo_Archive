<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/study.css?v=study22">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>Study</h1>
        <nav class="toolbar" aria-label="Study navigation">
          <a href="/">Archive</a>
          <a href="/search">Search</a>
          <a href="/notes">Notes</a>
          <a href="/study" aria-current="page">Study</a>
          <a href="/translations">Translations</a>
        </nav>
      </header>

      <form id="studyForm" class="study-form">
        <label class="query-label">
          Find saved note
          <input id="studyQuery" name="q" autocomplete="off">
        </label>
        <details class="filter-panel">
          <summary>Filters</summary>
          <div class="filter-panel-fields">
            <label>
              Corpus
              <select id="studyCorpus" name="corpus_id">
                <option value="">All</option>
              </select>
            </label>
            <label>
              Work
              <input id="studyWork" name="work_id" autocomplete="off">
            </label>
            <label>
              Tag
              <input id="studyTag" name="tag" autocomplete="off">
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="studySubmit" type="submit">Apply</button>
          <button id="studyClear" type="button" class="secondary-action" disabled>Clear</button>
        </div>
      </form>
      <div id="studyActiveFilters" class="active-filters" aria-live="polite" aria-label="Active study filters"></div>
      <div id="studyOverview" class="study-overview" aria-live="polite" aria-label="Study overview" hidden></div>

      <details id="studyExportTools" class="export-tools" hidden>
        <summary>Downloads</summary>
        <div class="export-row" aria-label="Download study material">
          <a id="studyExportMarkdown" href="/api/study/export?format=markdown">Notes</a>
          <a id="studyExportTranslations" href="/api/sentence-translations/export?format=markdown&review_state=reviewed" hidden>Saved translations</a>
        </div>
      </details>

      <div id="studyStatus" class="study-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="studyResults" class="study-results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/study.js?v=study37"></script>
</body>
</html>
