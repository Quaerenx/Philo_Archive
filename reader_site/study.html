<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Notes / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/study.css?v=study10">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>Study Notes</h1>
        <div class="meta-line">Personal Archive of Literature / reviewed annotations</div>
        <nav class="toolbar" aria-label="Study navigation">
          <a href="/">Archive index</a>
          <a href="/search">Research search</a>
          <a href="/notes">Research notes</a>
          <a href="/translations">Translation review</a>
        </nav>
      </header>

      <form id="studyForm" class="study-form">
        <label class="query-label">
          Query
          <input id="studyQuery" name="q" autocomplete="off">
        </label>
        <details class="filter-panel">
          <summary>Filters</summary>
          <div class="filter-panel-fields">
            <label>
              Corpus
              <select id="studyCorpus" name="corpus_id">
                <option value="">All</option>
              </select>
            </label>
            <label>
              Work
              <input id="studyWork" name="work_id" autocomplete="off">
            </label>
            <label>
              Tag
              <input id="studyTag" name="tag" autocomplete="off">
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="studySubmit" type="submit">Filter</button>
          <button id="studyClear" type="button" class="secondary-action" disabled>Clear</button>
        </div>
      </form>
      <div id="studyActiveFilters" class="active-filters" aria-live="polite" aria-label="Active study filters"></div>

      <details class="export-tools">
        <summary>Export</summary>
        <div class="export-row" aria-label="Export or review study notes">
          <a id="studyExportMarkdown" href="/api/study/export?format=markdown">Readable bundle</a>
          <a id="studyManageLink" href="/notes?review_state=reviewed">Review notes</a>
        </div>
      </details>

      <div id="studyStatus" class="study-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="studyResults" class="study-results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/study.js?v=study10"></script>
</body>
</html>
