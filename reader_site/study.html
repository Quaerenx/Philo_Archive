<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>학습 기록 / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame2">
  <link rel="stylesheet" href="/assets/study.css?v=study28">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>학습 기록</h1>
        <nav class="toolbar" aria-label="학습 기록 내비게이션">
          <a href="/">아카이브</a>
          <a href="/search">검색</a>
          <a href="/notes">노트</a>
          <a href="/study" aria-current="page">학습</a>
          <a href="/translations">번역</a>
        </nav>
      </header>

      <form id="studyForm" class="study-form">
        <label class="query-label">
          저장한 노트 찾기
          <input id="studyQuery" name="q" autocomplete="off">
        </label>
        <details class="filter-panel">
          <summary>조건</summary>
          <div class="filter-panel-fields">
            <label>
              자료
              <select id="studyCorpus" name="corpus_id">
                <option value="">전체</option>
              </select>
            </label>
            <label>
              문서
              <input id="studyWork" name="work_id" autocomplete="off">
            </label>
            <label>
              태그
              <input id="studyTag" name="tag" autocomplete="off">
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="studySubmit" type="submit">적용</button>
          <button id="studyClear" type="button" class="secondary-action" disabled>지우기</button>
        </div>
      </form>
      <div id="studyActiveFilters" class="active-filters" aria-live="polite" aria-label="활성 학습 조건"></div>
      <div id="studyOverview" class="study-overview" aria-live="polite" aria-label="학습 개요" hidden></div>

      <div id="studyStatus" class="study-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="studyResults" class="study-results" aria-live="polite" aria-busy="false"></section>

      <details id="studyExportTools" class="export-tools" hidden>
        <summary>내보내기</summary>
        <div class="export-row" aria-label="학습 자료 다운로드">
          <a id="studyExportMarkdown" href="/api/study/export?format=markdown">노트</a>
          <a id="studyExportTranslations" href="/api/sentence-translations/export?format=markdown&review_state=reviewed" hidden>저장한 번역</a>
        </div>
      </details>
    </main>
  </div>
  <script src="/assets/study.js?v=study46"></script>
</body>
</html>
