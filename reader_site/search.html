<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Search / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/search.css?v=phase13">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>Research Search</h1>
        <div class="meta-line">Personal Archive of Literature / segment index</div>
        <nav class="toolbar" aria-label="Search navigation">
          <a href="/">Archive index</a>
          <a href="/notes">Research notes</a>
          <a href="/study">Study notes</a>
          <a href="/translations">Saved translations</a>
        </nav>
      </header>

      <form id="searchForm" class="search-form">
        <label class="query-label">
          Query
          <input id="queryInput" name="q" autocomplete="off" autofocus>
        </label>
        <details class="filter-panel">
          <summary>Filters</summary>
          <div class="filter-panel-fields">
            <label>
              Corpus
              <select id="corpusSelect" name="corpus_id">
                <option value="">All</option>
                <option value="nietzsche">Nietzsche</option>
                <option value="bible">Bible</option>
                <option value="kierkegaard">Kierkegaard</option>
                <option value="wittgenstein">Wittgenstein</option>
              </select>
            </label>
            <label>
              Work
              <select id="workSelect" name="work_id" disabled>
                <option value="">All works</option>
              </select>
            </label>
            <label>
              Variant
              <select id="variantSelect" name="variant_id" disabled>
                <option value="">All variants</option>
              </select>
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="searchSubmit" type="submit">Search</button>
          <button id="searchClear" type="button" class="secondary-action" disabled>Clear</button>
        </div>
      </form>
      <div id="searchActiveFilters" class="active-filters" aria-live="polite" aria-label="Active search filters"></div>

      <div id="searchStatus" class="search-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="results" class="results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/search.js?v=phase13"></script>
</body>
</html>
