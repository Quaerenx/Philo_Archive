<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>검색 / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame3">
  <link rel="stylesheet" href="/assets/search.css?v=phase32">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>검색</h1>
        <nav class="toolbar" aria-label="검색 이동">
          <a href="/">아카이브</a>
          <a href="/search" aria-current="page">검색</a>
          <a href="/notes">노트</a>
          <a href="/study">학습</a>
          <a href="/translations">번역</a>
        </nav>
      </header>

      <form id="searchForm" class="search-form">
        <label class="query-label">
          본문 찾기
          <input id="queryInput" name="q" autocomplete="off" autofocus placeholder="예: GM, ressentiment, John 3:16">
        </label>
        <details class="filter-panel">
          <summary>범위</summary>
          <div class="filter-panel-fields">
            <label>
              자료
              <select id="corpusSelect" name="corpus_id">
                <option value="">전체</option>
                <option value="nietzsche">니체</option>
                <option value="bible">성경</option>
                <option value="kierkegaard">키르케고르</option>
                <option value="wittgenstein">비트겐슈타인</option>
              </select>
            </label>
            <label>
              문서
              <select id="workSelect" name="work_id" disabled>
                <option value="">전체 문서</option>
              </select>
            </label>
            <label>
              판본
              <select id="variantSelect" name="variant_id" disabled>
                <option value="">전체 판본</option>
              </select>
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="searchSubmit" type="submit">검색</button>
          <button id="searchClear" type="button" class="secondary-action" disabled>지우기</button>
        </div>
      </form>
      <div id="searchActiveFilters" class="active-filters" aria-live="polite" aria-label="활성 검색 조건"></div>
      <div id="searchReturn" class="search-return" hidden></div>

      <div id="searchStatus" class="search-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="results" class="results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/search.js?v=phase43"></script>
</body>
</html>
