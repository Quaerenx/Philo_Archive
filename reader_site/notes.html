<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/notes.css?v=notes15">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>Notes</h1>
        <div class="meta-line">Personal Archive of Literature / saved notes and source annotations</div>
        <nav class="toolbar" aria-label="Notes navigation">
          <a href="/">Archive</a>
          <a href="/search">Search</a>
          <a href="/study">Study</a>
          <a href="/translations">Review</a>
        </nav>
      </header>

      <form id="notesForm" class="notes-form">
        <label class="query-label">
          Query
          <input id="notesQuery" name="q" autocomplete="off">
        </label>
        <details class="filter-panel">
          <summary>Filters</summary>
          <div class="filter-panel-fields">
            <label>
              Corpus
              <select id="notesCorpus" name="corpus_id">
                <option value="">All</option>
              </select>
            </label>
            <label>
              Work
              <input id="notesWork" name="work_id" autocomplete="off">
            </label>
            <label>
              Tag
              <input id="notesTag" name="tag" autocomplete="off">
            </label>
            <label>
              Status
              <select id="notesReview" name="review_state">
                <option value="">All</option>
                <option value="raw">Working</option>
                <option value="reviewed">Saved</option>
              </select>
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="notesSubmit" type="submit">Filter</button>
          <button id="notesClear" type="button" class="secondary-action" disabled>Clear</button>
        </div>
      </form>
      <div id="notesActiveFilters" class="active-filters" aria-live="polite" aria-label="Active notes filters"></div>

      <details class="export-tools">
        <summary>Export</summary>
        <div class="export-row" aria-label="Export notes">
          <a id="exportMarkdown" href="/api/notes/export?format=markdown">Markdown</a>
          <a id="exportJson" href="/api/notes/export?format=json">JSON</a>
          <a id="exportJsonl" href="/api/notes/export?format=jsonl">JSONL</a>
        </div>
      </details>

      <div id="notesStatus" class="notes-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="notesResults" class="notes-results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/notes.js?v=notes17"></script>
</body>
</html>
