<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Notes / Personal Archive of Literature</title>
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/notes.css?v=notes3">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>Research Notes</h1>
        <div class="meta-line">Personal Archive of Literature / personal annotations</div>
        <nav class="toolbar" aria-label="Notes navigation">
          <a href="/">Archive index</a>
          <a href="/search">Research search</a>
          <a href="/study">Study notes</a>
        </nav>
      </header>

      <form id="notesForm" class="notes-form">
        <label class="query-label">
          Query
          <input id="notesQuery" name="q" autocomplete="off">
        </label>
        <label>
          Corpus
          <select id="notesCorpus" name="corpus_id">
            <option value="">All</option>
          </select>
        </label>
        <label>
          Work
          <input id="notesWork" name="work_id" autocomplete="off">
        </label>
        <label>
          Tag
          <input id="notesTag" name="tag" autocomplete="off">
        </label>
        <label>
          Review
          <select id="notesReview" name="review_state">
            <option value="">All</option>
            <option value="raw">Raw</option>
            <option value="reviewed">Reviewed</option>
          </select>
        </label>
        <button type="submit">Filter</button>
      </form>

      <div class="export-row" aria-label="Export notes">
        <a id="exportJson" href="/api/notes/export?format=json">JSON</a>
        <a id="exportJsonl" href="/api/notes/export?format=jsonl">JSONL</a>
        <a id="exportMarkdown" href="/api/notes/export?format=markdown">Markdown</a>
      </div>

      <div id="notesStatus" class="notes-status"></div>
      <section id="notesResults" class="notes-results" aria-live="polite"></section>
    </main>
  </div>
  <script src="/assets/notes.js?v=notes4"></script>
</body>
</html>
