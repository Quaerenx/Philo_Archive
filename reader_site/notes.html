<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>노트 / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/notes.css?v=notes22">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>노트</h1>
        <nav class="toolbar" aria-label="노트 내비게이션">
          <a href="/">아카이브</a>
          <a href="/search">검색</a>
          <a href="/notes" aria-current="page">노트</a>
          <a href="/study">학습</a>
          <a href="/translations">번역</a>
        </nav>
      </header>

      <form id="notesForm" class="notes-form">
        <label class="query-label">
          노트 찾기
          <input id="notesQuery" name="q" autocomplete="off">
        </label>
        <details class="filter-panel">
          <summary>노트 찾기</summary>
          <div class="filter-panel-fields">
            <label>
              자료
              <select id="notesCorpus" name="corpus_id">
                <option value="">전체</option>
              </select>
            </label>
            <label>
              문서
              <input id="notesWork" name="work_id" autocomplete="off">
            </label>
            <label>
              태그
              <input id="notesTag" name="tag" autocomplete="off">
            </label>
            <label>
              상태
              <select id="notesReview" name="review_state">
                <option value="">전체</option>
                <option value="raw">작성 중</option>
                <option value="reviewed">저장됨</option>
              </select>
            </label>
          </div>
        </details>
        <div class="form-actions">
          <button id="notesSubmit" type="submit">적용</button>
          <button id="notesClear" type="button" class="secondary-action" disabled>지우기</button>
        </div>
      </form>
      <div id="notesActiveFilters" class="active-filters" aria-live="polite" aria-label="활성 노트 필터"></div>

      <details id="notesExportTools" class="export-tools" hidden>
        <summary>내보내기</summary>
        <div class="export-row" aria-label="노트 다운로드">
          <a id="exportMarkdown" href="/api/notes/export?format=markdown" title="Markdown 다운로드">읽기용</a>
          <a id="exportJson" href="/api/notes/export?format=json" title="JSON 데이터 다운로드">데이터</a>
          <a id="exportJsonl" href="/api/notes/export?format=jsonl" title="JSONL 데이터 다운로드" hidden tabindex="-1" aria-hidden="true">JSONL</a>
        </div>
      </details>

      <div id="notesStatus" class="notes-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="notesResults" class="notes-results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/notes.js?v=notes32"></script>
</body>
</html>
