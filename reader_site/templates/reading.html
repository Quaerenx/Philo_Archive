<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/static-reader.css?v=static2">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader reading-mode">
      <header class="reader-header">
        <h1>{{TITLE}}</h1>
        <details class="source-details">
          <summary>Path</summary>
          <div class="path">{{SOURCE_PATH}}</div>
        </details>
        <nav class="toolbar" aria-label="Reader navigation">
          <a href="/">Archive</a>
          <a href="{{SOURCE_HREF}}">Source</a>
        </nav>
      </header>
      <article class="reading-body">{{CONTENT}}</article>
    </main>
  </div>
</body>
</html>
