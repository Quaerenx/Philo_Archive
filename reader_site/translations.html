<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Translations / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/notes.css?v=notes20">
  <link rel="stylesheet" href="/assets/translations.css?v=trans25">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>Translations</h1>
        <nav class="toolbar" aria-label="Translations navigation">
          <a href="/">Archive</a>
          <a href="/search">Search</a>
          <a href="/notes">Notes</a>
          <a href="/study">Study</a>
          <a href="/translations" aria-current="page">Translations</a>
        </nav>
      </header>

      <details id="translationsListTools" class="list-tools">
        <summary>Filter</summary>
        <form id="translationsForm" class="notes-form translations-form">
          <label class="query-label">
            Find record
            <input id="translationsQuery" name="q" autocomplete="off">
          </label>
          <div class="filter-panel-fields translations-filter-fields">
            <label>
              Corpus
              <select id="translationsCorpus" name="corpus_id">
                <option value="">All corpora</option>
                <option value="nietzsche">Nietzsche</option>
                <option value="bible">Bible</option>
                <option value="kierkegaard">Kierkegaard</option>
                <option value="wittgenstein">Wittgenstein</option>
              </select>
            </label>
            <label>
              Work
              <input id="translationsWork" name="work_id" list="translationsWorkOptions" autocomplete="off">
              <datalist id="translationsWorkOptions"></datalist>
            </label>
            <label>
              Status
              <select id="translationsReview" name="review_state">
                <option value="all">All</option>
                <option value="generated">To check</option>
                <option value="reviewed">Saved</option>
                <option value="rejected">Discarded</option>
              </select>
            </label>
          </div>
          <div class="form-actions">
            <button id="translationsSubmit" type="submit">Apply</button>
            <button id="translationsClear" type="button" class="secondary-action" disabled>Clear</button>
          </div>
        </form>
        <details id="translationsExportTools" class="export-tools" hidden>
          <summary>Downloads</summary>
          <div class="export-row" aria-label="Download translations">
            <a id="translationsExportMarkdown" href="/api/sentence-translations/export?format=markdown&review_state=all">Markdown</a>
            <a id="translationsExportJson" href="/api/sentence-translations/export?format=json&review_state=all">JSON</a>
          </div>
        </details>
      </details>
      <div id="translationsActiveFilters" class="active-filters" aria-live="polite" aria-label="Active translation filters"></div>

      <div class="review-export-row">
        <button id="translationsReviewQueue" type="button" class="translation-review-queue" aria-keyshortcuts="Q" title="Records to check" disabled>Check translations</button>
      </div>

      <div id="translationsStatus" class="notes-status translations-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="translationsResults" class="notes-results translations-results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/translations.js?v=trans58"></script>
</body>
</html>
