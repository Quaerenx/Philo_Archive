<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Translations / Personal Archive of Literature</title>
  <link rel="icon" href="/assets/favicon.svg?v=phi1" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/design-tokens.css?v=frame1">
  <link rel="stylesheet" href="/assets/notes.css?v=notes10">
  <link rel="stylesheet" href="/assets/translations.css?v=trans1">
</head>
<body>
  <div class="page">
    <div class="spacer"></div>
    <main class="reader">
      <header class="reader-header">
        <h1>AI Translations</h1>
        <div class="meta-line">Personal Archive of Literature / generated study aids</div>
        <nav class="toolbar" aria-label="AI translation navigation">
          <a href="/">Archive index</a>
          <a href="/search">Research search</a>
          <a href="/notes">Research notes</a>
          <a href="/study">Study notes</a>
        </nav>
      </header>

      <form id="translationsForm" class="notes-form translations-form">
        <label class="query-label">
          Query
          <input id="translationsQuery" name="q" autocomplete="off">
        </label>
        <label>
          Corpus
          <select id="translationsCorpus" name="corpus_id">
            <option value="nietzsche">Nietzsche</option>
            <option value="bible">Bible</option>
            <option value="kierkegaard">Kierkegaard</option>
            <option value="wittgenstein">Wittgenstein</option>
          </select>
        </label>
        <label>
          Work
          <input id="translationsWork" name="work_id" autocomplete="off">
        </label>
        <label>
          Review
          <select id="translationsReview" name="review_state">
            <option value="all">All</option>
            <option value="generated">Generated</option>
            <option value="reviewed">Reviewed</option>
            <option value="rejected">Rejected</option>
          </select>
        </label>
        <div class="form-actions">
          <button id="translationsSubmit" type="submit">Filter</button>
          <button id="translationsClear" type="button" class="secondary-action" disabled>Clear</button>
        </div>
      </form>
      <div id="translationsActiveFilters" class="active-filters" aria-live="polite" aria-label="Active translation filters"></div>

      <div class="export-row" aria-label="Export AI translations">
        <a id="translationsExportMarkdown" href="/api/sentence-translations/export?corpus_id=nietzsche&format=markdown&review_state=all">Markdown</a>
        <a id="translationsExportJson" href="/api/sentence-translations/export?corpus_id=nietzsche&format=json&review_state=all">JSON</a>
      </div>

      <div id="translationsStatus" class="notes-status translations-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <section id="translationsResults" class="notes-results translations-results" aria-live="polite" aria-busy="false"></section>
    </main>
  </div>
  <script src="/assets/translations.js?v=trans1"></script>
</body>
</html>
